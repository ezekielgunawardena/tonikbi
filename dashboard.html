<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tonik BI" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1a18" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Tonik Performance Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 1.25rem 1rem; padding-left: max(1rem, env(safe-area-inset-left)); padding-right: max(1rem, env(safe-area-inset-right)); padding-bottom: max(1.25rem, env(safe-area-inset-bottom)); }
    .container { max-width: 1400px; margin: 0 auto; }
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 8px; }
    .wordmark { font-size: 13px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #185FA5; flex-shrink: 0; }
    .page-title { font-size: 18px; font-weight: 500; color: #1a1a18; line-height: 1.2; }
    .page-sub { font-size: 11px; color: #73726c; margin-top: 3px; }
    .period-tabs { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .tab-btn { font-size: 12px; padding: 7px 14px; border-radius: 6px; border: 1px solid #d3d1c7; cursor: pointer; background: #fff; color: #73726c; font-family: inherit; transition: all 0.15s; white-space: nowrap; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .tab-btn:hover { border-color: #185FA5; color: #185FA5; }
    .tab-btn.active { background: #185FA5; color: #fff; border-color: #185FA5; }
    .period-select { font-size: 13px; padding: 7px 12px; border-radius: 6px; border: 1.5px solid #185FA5; background: #fff; color: #1a1a18; font-family: inherit; cursor: pointer; outline: none; font-weight: 500; }
    .period-select:focus { border-color: #185FA5; box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
    .section-header { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #888780; margin-bottom: 0.875rem; padding-bottom: 0.5rem; border-bottom: 1px solid #d3d1c7; }
    .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 1.25rem; }
    .metric-card { background: #fff; border-radius: 10px; padding: 0.75rem 0.875rem; border: 1px solid #e8e7e1; }
    .metric-label { font-size: 10px; color: #888780; margin-bottom: 4px; line-height: 1.3; }
    .metric-value { font-size: 17px; font-weight: 500; color: #1a1a18; line-height: 1.2; word-break: break-word; }
    .metric-sub { font-size: 10px; color: #b4b2a9; margin-top: 3px; }
    .metric-var { font-size: 10px; margin-top: 4px; font-weight: 600; }
    .var-pos { color: #0F6E56; }
    .var-neg { color: #993C1D; }
    .chart-stack { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.25rem; }
    .chart-box { background: #fff; border: 1px solid #e8e7e1; border-radius: 12px; padding: 1rem; }
    .chart-title { font-size: 12px; font-weight: 500; color: #5f5e5a; margin-bottom: 0.5rem; }
    .legend { display: flex; gap: 12px; margin-bottom: 8px; font-size: 11px; color: #888780; }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .chart-wrap { position: relative; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 1.25rem; }
    .table-scroll::-webkit-scrollbar { height: 4px; }
    .table-scroll::-webkit-scrollbar-thumb { background: #d3d1c7; border-radius: 2px; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 11px; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e8e7e1; min-width: 640px; }
    .data-table th { text-align: right; padding: 7px 9px; color: #888780; font-weight: 600; font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; background: #f9f8f5; border-bottom: 1px solid #e8e7e1; white-space: nowrap; }
    .data-table th:first-child { text-align: left; }
    .data-table td { text-align: right; padding: 7px 9px; color: #2c2c2a; border-bottom: 1px solid #f1efe8; white-space: nowrap; }
    .data-table td:first-child { text-align: left; font-weight: 500; }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table .var-cell { font-weight: 600; }
    .data-table .total-row td { font-weight: 600; border-top: 1.5px solid #d3d1c7; background: #f9f8f5; }
    .scroll-hint { font-size: 10px; color: #b4b2a9; margin-bottom: 4px; display: none; }
    .tonik-section { margin-top: 2rem; padding-top: 1.75rem; border-top: 2px solid #d3d1c7; }
    .tonik-badge { display: inline-block; background: #185FA5; color: #B5D4F4; font-size: 20px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 24px; border-radius: 8px; margin-bottom: 1rem; }
    .share-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 1.25rem; }
    .loading { text-align: center; padding: 3rem 1rem; color: #888780; font-size: 14px; }
    .error-banner { background: #fff0ed; border: 1px solid #f5c4b3; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1.25rem; font-size: 12px; color: #993C1D; }
    @media (min-width: 640px) {
      body { padding: 2rem 1.5rem; }
      .metric-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .share-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .chart-stack { display: grid; grid-template-columns: 1fr 1fr; }
      .chart-stack.single { display: block; }
      .metric-value { font-size: 20px; }
      .metric-label, .metric-var, .metric-sub { font-size: 11px; }
      .data-table { font-size: 12px; min-width: unset; }
      .data-table th { font-size: 10px; padding: 8px 10px; }
      .data-table td { padding: 8px 10px; }
    }
    @media (min-width: 1280px) {
      body { padding: 2.5rem 3rem; }
      .metric-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
      .share-grid  { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
      .chart-stack { gap: 1.25rem; margin-bottom: 1.5rem; }
      .chart-box   { padding: 1.25rem 1.5rem; }
      .chart-wrap  { }
      .metric-card { padding: 1rem 1.25rem; }
      .metric-value { font-size: 22px; }
      .metric-label { font-size: 12px; }
      .page-title  { font-size: 22px; }
      .section-header { font-size: 11px; }
      .data-table  { font-size: 13px; }
      .data-table th { font-size: 11px; padding: 9px 12px; }
      .data-table td { padding: 9px 12px; }
    }
    @media (min-width: 1600px) {
      body { padding: 3rem 4rem; }
      .chart-stack { grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    }
    @media (max-width: 639px) { .scroll-hint { display: block; } }
  </style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <div>
      <div class="page-title">Performance Dashboard</div>
      <div class="page-sub">Actuals vs budget — revenue, room nights, ARR, occupancy</div>
    </div>
    <div class="wordmark">Tonik</div>
    <div style="display:flex;gap:8px;flex-shrink:0;align-items:center;">
      <button onclick="showExportModal()" style="font-size:11px;font-weight:500;color:#1D9E75;text-decoration:none;background:#fff;border:1px solid #d3d1c7;padding:6px 12px;border-radius:6px;display:flex;align-items:center;gap:5px;cursor:pointer;font-family:inherit;">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export

      <a href="admin.html" style="font-size:11px;font-weight:500;color:#185FA5;text-decoration:none;background:#fff;border:1px solid #d3d1c7;padding:6px 12px;border-radius:6px;display:flex;align-items:center;gap:5px;flex-shrink:0;">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Admin

  <!-- EXPORT MODAL -->
  <div id="export-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:1rem;">
    <div style="background:#fff;border-radius:16px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid #e8e7e1;">
        <div style="font-size:14px;font-weight:600;color:#1a1a18;">Export data</div>
        <button onclick="closeExportModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#73726c;line-height:1;">✕</button>
      </div>
      <div style="padding:1.5rem;">
        <p style="font-size:12px;color:#73726c;margin-bottom:1.25rem;">Choose what to export. Files download in the same CSV format used for uploads — ready to audit or re-upload.</p>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <button onclick="exportData('property')" style="font-family:inherit;font-size:13px;font-weight:500;padding:10px 16px;border-radius:8px;border:1px solid #e8e7e1;background:#f9f8f5;color:#1a1a18;cursor:pointer;text-align:left;">
            📊 Property stats — all months
            <div style="font-size:11px;color:#73726c;font-weight:400;margin-top:2px;">KAHA, Villa Sayura, Garfield Bungalow, Garfield Cottage</div>
          </button>
          <button onclick="exportData('tonik')" style="font-family:inherit;font-size:13px;font-weight:500;padding:10px 16px;border-radius:8px;border:1px solid #e8e7e1;background:#f9f8f5;color:#1a1a18;cursor:pointer;text-align:left;">

          <button onclick="exportData('both')" style="font-family:inherit;font-size:13px;font-weight:500;padding:10px 16px;border-radius:8px;border:1px solid #185FA5;background:#EBF3FC;color:#185FA5;cursor:pointer;text-align:left;">

<script>
// ─── CONFIG — replace with your Supabase project values ───────────────────────
const SUPABASE_URL  = 'https://rmnufhsfuaycpkdzwfgj.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtbnVmaHNmdWF5Y3BrZHp3ZmdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5Njc3NjksImV4cCI6MjA5NzU0Mzc2OX0.rnBgL4fAowZrimTP3LZMSZwcOBcTW-kraPnupqyidU4';
// FY start month (April = 4)
const FY_START_MONTH = 4;
let USD_RATE = parseFloat(localStorage.getItem('tonik_usd_rate') || '333'); // updated after load
// ──────────────────────────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// helpers
function fmt(n)  { return Math.round(n || 0).toLocaleString('en-US'); }
function fmtShort(v) {
  if (!v || v === 0) return '0';
  if (Math.abs(v) >= 1000000) return (v/1000000).toFixed(1)+'M';
  if (Math.abs(v) >= 1000)    return (v/1000).toFixed(0)+'K';
  return Math.round(v).toString();
}
function fmtPct(n)    { return (n||0).toFixed(1)+'%'; }
function varCls(a,b)  { return (a||0)>=(b||0) ? 'var-pos' : 'var-neg'; }
function varSign(a,b) { const v=(a||0)-(b||0); return (v>=0?'+':'')+fmt(v); }
function varPctSign(a,b) { const v=(a||0)-(b||0); return (v>=0?'+':'')+v.toFixed(1)+'pp'; }

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fyLabel(year, month) {
  // FY2026-27 runs Apr 2026 – Mar 2027
  const fyStart = month >= FY_START_MONTH ? year : year - 1;
  return `FY${fyStart}–${String(fyStart+1).slice(2)}`;
}

// Get FY year key for a given calendar year+month
function fyKey(year, month) {
  return month >= FY_START_MONTH ? year : year - 1;
}

let allPropStats  = [];
let allTonikStats = [];
let allPaceStats  = [];
let charts = {};
let activePeriod = null; // { type: 'month'|'ytd', year, month, fyYear }

async function loadData() {
  const [{ data: ps, error: e1 }, { data: ts, error: e2 }, { data: pace, error: e3 }, { data: rateRow }] = await Promise.all([
    sb.from('property_stats').select('*').order('stat_year').order('stat_month'),
    sb.from('tonik_stats').select('*').order('stat_year').order('stat_month'),
    sb.from('pace_stats').select('*').order('week_start'),
    sb.from('app_settings').select('value').eq('key','usd_rate').single(),
  ]);
  if (e1 || e2 || e3) throw new Error(e1?.message || e2?.message || e3?.message);
  allPropStats  = ps   || [];
  allTonikStats = ts   || [];
  allPaceStats  = pace || [];
  if (rateRow?.value) {
    USD_RATE = parseFloat(rateRow.value);
    localStorage.setItem('tonik_usd_rate', rateRow.value);
  }
}

function buildTabs() {
  // Collect distinct year+month combos across both tables, sorted
  const seen = new Set();
  [...allPropStats, ...allTonikStats].forEach(r => {
    if (r.stat_month === 99) return; // skip YTD flag rows
    seen.add(`${r.stat_year}-${String(r.stat_month).padStart(2,'0')}`);
  });
  const sorted = [...seen].sort();

  // Group by FY
  const fyGroups = {};
  sorted.forEach(key => {
    const [y, m] = key.split('-').map(Number);
    const fy = fyKey(y, m);
    if (!fyGroups[fy]) fyGroups[fy] = [];
    fyGroups[fy].push({ year: y, month: m });
  });

  return { sorted, fyGroups };
}

function renderTabs(fyGroups) {
  const container = document.getElementById('period-tabs');
  container.innerHTML = '';

  // Dropdown for period selection
  const sel = document.createElement('select');
  sel.className = 'period-select';
  sel.id = 'period-select';
  sel.addEventListener('change', () => {
    const val = sel.value;
    if (val === 'pace' || val === 'inquiries') {
      selectPeriod({ type: val });
      return;
    }
    const [type, ...rest] = val.split('|');
    if (type === 'ytd') {
      selectPeriod({ type: 'ytd', fyYear: +rest[0] });
    } else {
      selectPeriod({ type: 'month', year: +rest[0], month: +rest[1], fyYear: +rest[2] });
    }
  });

  Object.entries(fyGroups).sort().forEach(([fy, months]) => {
    const fyEnd = +fy + 1;
    const grp = document.createElement('optgroup');
    grp.label = `FY${String(fy).slice(2)}\u2013${String(fyEnd).slice(2)}`;

    const ytdOpt = document.createElement('option');
    ytdOpt.value = `ytd|${fy}`;
    ytdOpt.textContent = `FY${String(fy).slice(2)}\u2013${String(fyEnd).slice(2)} YTD`;
    grp.appendChild(ytdOpt);

    months.forEach(({ year, month }) => {
      const opt = document.createElement('option');
      opt.value = `month|${year}|${month}|${fy}`;
      opt.textContent = `${MONTH_NAMES[month-1]} ${year}`;
      grp.appendChild(opt);
    });

    sel.appendChild(grp);
  });

  container.appendChild(sel);

  // Booking Pace button
  const paceBtn = document.createElement('button');
  paceBtn.className = 'tab-btn';
  paceBtn.id = 'pace-tab-btn';
  paceBtn.textContent = '\u{1F4C8} Booking Pace';
  paceBtn.style.cssText = 'background:#1a1a18;color:#f5f4f0;border-color:#1a1a18;';
  paceBtn.addEventListener('click', () => selectPeriod({ type: 'pace' }));
  container.appendChild(paceBtn);

  // Inquiries button
  const inqBtn = document.createElement('button');
  inqBtn.className = 'tab-btn';
  inqBtn.id = 'inq-tab-btn';
  inqBtn.textContent = '\u{1F50D} Inquiries';
  inqBtn.style.cssText = 'background:#1D5C3A;color:#f5f4f0;border-color:#1D5C3A;';
  inqBtn.addEventListener('click', () => selectPeriod({ type: 'inquiries' }));
  container.appendChild(inqBtn);
}

function selectPeriod(period) {
  activePeriod = period;

  // Sync dropdown value
  const sel = document.getElementById('period-select');
  if (sel) {
    if (period.type === 'month') {
      sel.value = `month|${period.year}|${period.month}|${period.fyYear}`;
    } else if (period.type === 'ytd') {
      sel.value = `ytd|${period.fyYear}`;
    }
  }

  // Sync pace/inquiries button active state
  const paceBtn = document.getElementById('pace-tab-btn');
  const inqBtn  = document.getElementById('inq-tab-btn');
  if (paceBtn) paceBtn.style.background = period.type === 'pace'       ? '#185FA5' : '#1a1a18';
  if (inqBtn)  inqBtn.style.background  = period.type === 'inquiries'  ? '#185FA5' : '#1D5C3A';

  // Toggle views
  document.getElementById('perf-view').style.display       = (period.type === 'month' || period.type === 'ytd') ? '' : 'none';
  document.getElementById('pace-view').style.display       = period.type === 'pace'       ? '' : 'none';
  document.getElementById('inquiries-view').style.display  = period.type === 'inquiries'  ? '' : 'none';

  if (period.type === 'pace')            renderPace();
  else if (period.type === 'inquiries')  renderInquiries();
  else                                   renderDashboard(period);
}

// Aggregate property stats for a period
function getPropData(period) {
  let rows;
  if (period.type === 'month') {
    // Monthly: exclude YTD flag rows (month=99)
    rows = allPropStats.filter(r => r.stat_year === period.year && r.stat_month === period.month && r.stat_month !== 99);
  } else {
    // YTD: use the dedicated month=99 rows if they exist, otherwise sum monthly rows
    const ytdRows = allPropStats.filter(r => r.stat_year === period.fyYear && r.stat_month === 99);
    rows = ytdRows.length > 0 ? ytdRows : allPropStats.filter(r => fyKey(r.stat_year, r.stat_month) === period.fyYear && r.stat_month !== 99);
  }

  // Group by property
  const props = {};
  rows.forEach(r => {
    if (!props[r.property_name]) {
      props[r.property_name] = { name: r.property_name, type: r.property_type, revA:0, revB:0, arrA:null, arrB:null, rnA:0, rnB:0, occuA:0, occuB:0, _count:0 };
    }
    const p = props[r.property_name];
    p.revA  += r.rev_actual  || 0;
    p.revB  += r.rev_budget  || 0;
    p.rnA   += r.rn_actual   || 0;
    p.rnB   += r.rn_budget   || 0;
    p.occuA += r.occu_actual || 0;
    p.occuB += r.occu_budget || 0;
    // Always read ARR directly from stored values
    if (r.arr_actual) p.arrA = r.arr_actual;
    if (r.arr_budget) p.arrB = r.arr_budget;
    p._count++;
  });

  return Object.values(props).map(p => ({
    ...p,
    arrA: p.arrA !== undefined ? p.arrA : (p.rnA > 0 ? p.revA / p.rnA : 0),
    arrB: p.arrB !== undefined ? p.arrB : (p.rnB > 0 ? p.revB / p.rnB : 0),
    occuA: p._count > 0 ? p.occuA / p._count : 0,
    occuB: p._count > 0 ? p.occuB / p._count : 0,
  }));
}

// Aggregate tonik stats for a period
function getTonikData(period) {
  let rows;
  if (period.type === 'month') {
    rows = allTonikStats.filter(r => r.stat_year === period.year && r.stat_month === period.month && r.stat_month !== 99);
  } else {
    const ytdRows = allTonikStats.filter(r => r.stat_year === period.fyYear && r.stat_month === 99);
    rows = ytdRows.length > 0 ? ytdRows : allTonikStats.filter(r => fyKey(r.stat_year, r.stat_month) === period.fyYear && r.stat_month !== 99);
  }

  const segs = {};
  rows.forEach(r => {
    if (!segs[r.segment]) {
      segs[r.segment] = { segment: r.segment, revA:0, revB:0, arrA:null, arrB:null, rnA:0, rnB:0, occuA:0, occuB:0, shareA:0, shareB:0, villasA:0, villasB:0, roomsA:0, roomsB:0, _count:0 };
    }
    const s = segs[r.segment];
    s.revA   += r.rev_actual    || 0;
    s.revB   += r.rev_budget    || 0;
    s.rnA    += r.rn_actual     || 0;
    s.rnB    += r.rn_budget     || 0;
    s.shareA += r.share_actual  || 0;
    s.shareB += r.share_budget  || 0;
    s.occuA  += r.occu_actual   || 0;
    s.occuB  += r.occu_budget   || 0;
    s.villasA = Math.max(s.villasA, r.villas_actual || 0);
    s.villasB = Math.max(s.villasB, r.villas_budget || 0);
    s.roomsA += r.rooms_actual  || 0;
    s.roomsB += r.rooms_budget  || 0;
    if (r.arr_actual) s.arrA = r.arr_actual;
    if (r.arr_budget) s.arrB = r.arr_budget;
    s._count++;
  });

  return Object.fromEntries(
    Object.entries(segs).map(([k, s]) => [k.toLowerCase(), {
      ...s,
      arrA: s.arrA !== null ? s.arrA : (s.rnA > 0 ? s.revA / s.rnA : 0),
      arrB: s.arrB !== null ? s.arrB : (s.rnB > 0 ? s.revB / s.rnB : 0),
      occuA: s._count > 0 ? s.occuA / s._count : 0,
      occuB: s._count > 0 ? s.occuB / s._count : 0,
    }])
  );
}

let monthlyMetric = 'revenue';
let selectedProperties = new Set(['KAHA','Villa Sayura','Garfield Bungalow','Garfield Cottage']);

// Generate all months from Jan 2025 to Dec of current year + 1
function generateAllMonths() {
  const months = [];
  const now = new Date();
  const endYear = now.getFullYear() + 1;
  for (let y = 2025; y <= endYear; y++) {
    for (let m = 1; m <= 12; m++) {
      months.push({ year: y, month: m, label: MONTH_NAMES[m-1] + ' ' + String(y).slice(2) });
    }
  }
  return months;
}

const ALL_MONTHS = generateAllMonths();
const WINDOW_SIZE = 12; // months visible at once
let monthWindowStart = (() => {
  const now = new Date();
  const idx = ALL_MONTHS.findIndex(m => m.year === now.getFullYear() && m.month === 1);
  return Math.max(0, idx);
})();

function scrollMonths(delta) {
  monthWindowStart = Math.max(0, Math.min(ALL_MONTHS.length - WINDOW_SIZE, monthWindowStart + delta));
  buildMonthlyPropertyChart();
}

function toggleProperty(name) {
  if (selectedProperties.has(name)) {
    if (selectedProperties.size === 1) return;
    selectedProperties.delete(name);
  } else {
    selectedProperties.add(name);
  }
  buildMonthlyPropertyChart();
}
function setMonthlyMetric(metric) {
  monthlyMetric = metric;
  const active = 'font-size:10px;padding:4px 12px;border-radius:5px;border:1px solid #185FA5;background:#185FA5;color:#fff;cursor:pointer;font-family:inherit;';
  const inactive = 'font-size:10px;padding:4px 12px;border-radius:5px;border:1px solid #d3d1c7;background:#fff;color:#73726c;cursor:pointer;font-family:inherit;';
  document.getElementById('toggle-rev-btn').style.cssText = metric==='revenue'  ? active : inactive;
  document.getElementById('toggle-rn-btn').style.cssText  = metric==='rn'       ? active : inactive;
  document.getElementById('toggle-occ-btn').style.cssText = metric==='occupancy'? active : inactive;
  const titleEl = document.getElementById('monthly-chart-title');
  if (titleEl) titleEl.textContent =
    metric === 'revenue'   ? 'Monthly revenue by property' :
    metric === 'rn'        ? 'Monthly room nights by property' :
                             'Monthly occupancy by property';
  buildMonthlyPropertyChart();
}

function buildMonthlyPropertyChart() {
  const canvas = document.getElementById('monthlyRevChart');
  if (!canvas) return;

  const PROP_NAMES  = ['KAHA','Villa Sayura','Garfield Bungalow','Garfield Cottage'];
  const PROP_COLORS = ['#185FA5','#1D9E75','#534AB7','#D85A30'];
  const isRev = monthlyMetric === 'revenue';
  const isOcc = monthlyMetric === 'occupancy';

  // Current window of months
  const windowMonths = ALL_MONTHS.slice(monthWindowStart, monthWindowStart + WINDOW_SIZE);
  const labels = windowMonths.map(m => m.label);

  // Update range label
  const rangeEl = document.getElementById('monthly-range-label');
  if (rangeEl && windowMonths.length) {
    rangeEl.textContent = windowMonths[0].label + ' – ' + windowMonths[windowMonths.length-1].label;
  }

  // Update chart title
  const titleEl = document.getElementById('monthly-chart-title');
  if (titleEl) titleEl.textContent =
    isRev ? 'Monthly revenue by property' :
    isOcc ? 'Monthly occupancy by property' :
            'Monthly room nights by property';

  // Build data for each property across the window
  const propData = {};
  PROP_NAMES.forEach(name => { propData[name] = windowMonths.map(() => 0); });

  allPropStats.forEach(r => {
    if (r.stat_month === 99) return;
    const idx = windowMonths.findIndex(m => m.year === r.stat_year && m.month === r.stat_month);
    if (idx === -1) return;
    if (propData[r.property_name] !== undefined) {
      propData[r.property_name][idx] = isRev ? (r.rev_actual || 0)
        : isOcc ? (r.occu_actual || 0)
        : (r.rn_actual || 0);
    }
  });

  // Property toggle buttons
  const togglesEl = document.getElementById('monthly-prop-toggles');
  if (togglesEl) {
    togglesEl.innerHTML = PROP_NAMES.map((p,i) => {
      const isActive = selectedProperties.has(p);
      const col = PROP_COLORS[i];
      return `<button onclick="toggleProperty('${p}')" style="
        font-size:10px;padding:4px 12px;border-radius:5px;
        border:1px solid ${isActive ? col : '#d3d1c7'};
        background:${isActive ? col : '#fff'};
        color:${isActive ? '#fff' : '#73726c'};
        cursor:pointer;font-family:inherit;transition:all 0.15s;">${p}</button>`;
    }).join('');
  }

  const activeProps  = PROP_NAMES.filter(p => selectedProperties.has(p));
  const activeColors = activeProps.map(p => PROP_COLORS[PROP_NAMES.indexOf(p)]);

  if (charts.monthlyRev) charts.monthlyRev.destroy();

  charts.monthlyRev = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: activeProps.map((name, i) => ({
        label: name,
        data: propData[name],
        backgroundColor: activeColors[i],
        borderRadius: 3,
        barPercentage: 0.85,
        categoryPercentage: 0.9,
        datalabels: {
          display: ctx => ctx.dataset.data[ctx.dataIndex] > 0,
          anchor: 'end', align: 'end', offset: 1,
          font: { size: 9, weight: '600' }, color: '#444',
          formatter: v => isRev
            ? (v >= 1e6 ? (v/1e6).toFixed(1)+'M' : v >= 1000 ? (v/1000).toFixed(0)+'K' : v)
            : isOcc ? v.toFixed(1)+'%' : v
        }
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 24 } },
      plugins: { legend: { display: false }, datalabels: {} },
      scales: {
        x: { ticks: { font: { size: 10 } } },
        y: {
          beginAtZero: true,
          max: isOcc ? 100 : undefined,
          ticks: {
            font: { size: 10 },
            callback: v => isRev
              ? (v >= 1e6 ? 'LKR '+(v/1e6).toFixed(1)+'M' : 'LKR '+(v/1000).toFixed(0)+'K')
              : isOcc ? v+'%' : v
          }
        }
      }
    }
  });
}

function showExportModal() {

document.getElementById('export-modal').addEventListener('click', function(e) {
  if (e.target === this) closeExportModal();
});

function toCSVRow(vals) {
  return vals.map(v => (v === null || v === undefined) ? '' : String(v)).join(',');
}

function downloadCSV(filename, content) {
  const blob = new Blob([content], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function exportData(type) {
  const now = new Date();
  const ts  = now.toISOString().slice(0,10);

  if (type === 'property' || type === 'both') {
    const headers = 'property_name,property_type,stat_year,stat_month,rev_actual,rev_budget,arr_actual,arr_budget,rn_actual,rn_budget,occu_actual,occu_budget';
    const rows = allPropStats
      .filter(r => r.stat_month !== 99)
      .sort((a,b) => a.stat_year - b.stat_year || a.stat_month - b.stat_month || a.property_name.localeCompare(b.property_name))
      .map(r => toCSVRow([
        r.property_name, r.property_type, r.stat_year, r.stat_month,
        r.rev_actual, r.rev_budget, r.arr_actual, r.arr_budget,
        r.rn_actual, r.rn_budget, r.occu_actual, r.occu_budget
      ]));
    downloadCSV(`tonik_property_stats_export_${ts}.csv`, headers + '\n' + rows.join('\n'));
  }

  if (type === 'tonik' || type === 'both') {
    const headers = 'segment,stat_year,stat_month,rev_actual,rev_budget,arr_actual,arr_budget,rn_actual,rn_budget,occu_actual,occu_budget,share_actual,share_budget,villas_actual,villas_budget,rooms_actual,rooms_budget';
    const rows = allTonikStats
      .filter(r => r.stat_month !== 99)
      .sort((a,b) => a.stat_year - b.stat_year || a.stat_month - b.stat_month || a.segment.localeCompare(b.segment))
      .map(r => toCSVRow([
        r.segment, r.stat_year, r.stat_month,
        r.rev_actual, r.rev_budget, r.arr_actual, r.arr_budget,
        r.rn_actual, r.rn_budget, r.occu_actual, r.occu_budget,
        r.share_actual, r.share_budget, r.villas_actual, r.villas_budget,
        r.rooms_actual, r.rooms_budget
      ]));
    downloadCSV(`tonik_portfolio_stats_export_${ts}.csv`, headers + '\n' + rows.join('\n'));
  }

  closeExportModal();
}

// ── Pace chart ────────────────────────────────────────────────────────────────
const PACE_PROPERTIES = ['KAHA','Villa Sayura','Garfield Bungalow','Garfield Cottage'];
const PACE_COLORS = ['#185FA5','#1D9E75','#534AB7','#D85A30'];
let paceChart = null;
let activePaceProperty = 'Total';

function renderPace() {
  if (!allPaceStats.length) return;
  const rangeVal = document.getElementById('pace-range')?.value || '20';

  // Build week map
  const weekMap = {};
  allPaceStats.forEach(r => {
    if (!weekMap[r.week_start]) weekMap[r.week_start] = { label: r.week_label, props: {} };
    weekMap[r.week_start].props[r.property_name] = r.room_nights || 0;
  });

  let weeks = Object.entries(weekMap).sort((a,b) => a[0].localeCompare(b[0]));

  // Compute total per week
  weeks.forEach(([, w]) => {
    w.props['Total'] = PACE_PROPERTIES.reduce((s, p) => s + (w.props[p] || 0), 0);
  });

  // Slice to range
  if (rangeVal !== 'all') weeks = weeks.slice(-parseInt(rangeVal));

  const labels = weeks.map(([,w]) => w.label);
  const data   = weeks.map(([,w]) => w.props[activePaceProperty] || 0);
  const lineColor = activePaceProperty === 'Total' ? '#185FA5' : PACE_COLORS[PACE_PROPERTIES.indexOf(activePaceProperty)];

  // Property toggle buttons
  const tc = document.getElementById('pace-toggles');
  if (tc) {
    const allProps = ['Total', ...PACE_PROPERTIES];
    tc.innerHTML = allProps.map((p, i) => {
      const c = p === 'Total' ? '#1a1a18' : PACE_COLORS[i-1];
      const active = p === activePaceProperty;
      return `<button onclick="setPaceProperty('${p}')" style="font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid ${active?c:'#d3d1c7'};background:${active?c:'#fff'};color:${active?'#fff':'#73726c'};cursor:pointer;font-family:inherit;transition:all 0.15s;white-space:nowrap;">${p}</button>`;
    }).join('');
  }

  // Render line chart
  if (paceChart) paceChart.destroy();
  paceChart = new Chart(document.getElementById('paceChart'), {
    type: 'line',
    data: { labels, datasets: [{
      label: activePaceProperty, data,
      borderColor: lineColor, backgroundColor: lineColor + '18',
      borderWidth: 2, pointRadius: 4, pointHoverRadius: 6,
      pointBackgroundColor: lineColor, fill: true, tension: 0.3,
    }]},
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 32, right: 20, left: 10, bottom: 10 } },
      plugins: {
        legend: { display: false },
        datalabels: { display: true, anchor:'end', align:'top', offset:2, font:{size:9,weight:'600'}, color: lineColor, formatter: v => v === 0 ? '' : v }
      },
      scales: {
        x: { ticks: { font:{size:9}, maxRotation:45, autoSkip: weeks.length > 12 } },
        y: { beginAtZero: true, grace: '15%', ticks: { font:{size:10}, stepSize:5 } }
      }
    }
  });

  // Render table
  const allProps = ['Total', ...PACE_PROPERTIES];
  const tableRows = weeks.map(([,w]) =>
    `<tr><td>${w.label}</td>${allProps.map(p=>`<td>${w.props[p]||0}</td>`).join('')}</tr>`
  ).join('');
  document.getElementById('paceTable').innerHTML =
    `<thead><tr>${['Week',...allProps].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${tableRows}</tbody>`;
}

function setPaceProperty(prop) {
  activePaceProperty = prop;
  renderPace();
}

const SHEETS_CSV_URL = 'https://script.google.com/macros/s/AKfycbw08zBzu_dl66FF460NFvemEtYy7smqKJNoxdDhWdnNm5101sAlPITauwuFWO-zM46_/exec';
let inqData = null;
let inqCharts = {};

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    // Handle quoted commas
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; continue; }
      if (line[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
      cur += line[i];
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = cols[i] || '');
    return obj;
  }).filter(r => r['Name'] && r['Name'].trim());
}

function countBy(rows, field) {
  const counts = {};
  rows.forEach(r => {
    const v = r[field] || 'Unknown';
    counts[v] = (counts[v] || 0) + 1;
  });
  return counts;
}

let inqByPropChart, inqBySourceChart, inqByStatusChart;

async function renderInquiries() {
  const metricsEl = document.getElementById('inq-metrics');
  const tableEl   = document.getElementById('inqTable');
  if (!metricsEl) return;

  if (!inqData) {
    metricsEl.innerHTML = '<div style="font-size:12px;color:#73726c;padding:1rem 0;">Loading inquiries…</div>';
    try {
      const resp = await fetch(SHEETS_CSV_URL);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const json = await resp.json();
      inqData = json.filter(r => r['Name'] && String(r['Name']).trim());
      document.getElementById('inq-last-updated').textContent = 'Last fetched: ' + new Date().toLocaleTimeString('en-GB');

      // Populate status filter
      const statuses = [...new Set(inqData.map(r => r['Inquiry Status']).filter(Boolean))];
      const statusSel = document.getElementById('inq-filter-status');
      statuses.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        statusSel.appendChild(opt);
      });
    } catch(e) {
      metricsEl.innerHTML = `<div style="font-size:12px;color:#993C1D;padding:1rem 0;">Could not load inquiries: ${e.message}</div>`;
      return;
    }
  }

  // Apply filters
  const propFilter   = document.getElementById('inq-filter-prop')?.value || 'all';
  const statusFilter = document.getElementById('inq-filter-status')?.value || 'all';

  let rows = inqData;
  if (propFilter !== 'all')   rows = rows.filter(r => r['Property'] === propFilter);
  if (statusFilter !== 'all') rows = rows.filter(r => r['Inquiry Status'] === statusFilter);

  // KPI metrics — use Inquiry Date for volume
  const total      = rows.length;
  const now        = new Date();
  const thisMonth  = rows.filter(r => {
    const d = new Date(r['Inquiry Date']);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;
  const converted  = rows.filter(r => r['Inquiry Status']?.toLowerCase().includes('confirm') || r['Inquiry Status']?.toLowerCase().includes('convert') || r['Inquiry Status']?.toLowerCase().includes('book')).length;
  const ongoing    = rows.filter(r => r['Inquiry Status']?.toLowerCase().includes('ongoing')).length;
  const convRate   = total > 0 ? ((converted / total) * 100).toFixed(1) : '0.0';
  const totalGuests = rows.reduce((s, r) => s + (parseInt(r['No of guests']) || 0), 0);

  metricsEl.innerHTML = [
    { label: 'Total inquiries', v: total, sub: 'All time' },
    { label: 'This month', v: thisMonth, sub: new Date().toLocaleString('en-GB', { month: 'long', year: 'numeric' }) },
    { label: 'Ongoing', v: ongoing, sub: 'Active inquiries' },
    { label: 'Confirmed', v: converted, sub: `${convRate}% conversion` },
    { label: 'Total guests', v: totalGuests, sub: 'Across all inquiries' },
  ].map(c => `<div class="metric-card">
    <div class="metric-label">${c.label}</div>
    <div class="metric-value">${c.v}</div>
    <div class="metric-sub">${c.sub}</div>
  </div>`).join('');

  // ── Dynamic widgets ────────────────────────────────────────────────────────
  const dynEl = document.getElementById('dynamic-widgets');
  if (dynEl) {
    dynEl.innerHTML = '';
    const { data: widgets } = await sb.from('dashboard_widgets')
      .select('*').eq('active', true).order('sort_order');

    if (widgets?.length) {
      const COLORS = ['#185FA5','#1D9E75','#534AB7','#D85A30','#C9A84C','#888780','#E06C9F','#2C7BB6','#6BBE45','#F28E2B'];
      const widgetCharts = {};

      for (const w of widgets) {
        // Apply widget-level filters
        const filters = (typeof w.filters === 'string' ? JSON.parse(w.filters) : w.filters) || [];
        let wRows = rows.filter(r => {
          // Date filter
          if (w.date_from || w.date_to) {
            const d = new Date(r['Inquiry Date']);
            if (w.date_from && d < new Date(w.date_from)) return false;
            if (w.date_to   && d > new Date(w.date_to))   return false;
          }
          // Field filters
          return filters.every(f => {
            const val = String(r[f.field] || '').trim().toLowerCase();
            const fv  = String(f.value || '').toLowerCase();
            if (f.operator === 'equals')     return val === fv;
            if (f.operator === 'not_equals') return val !== fv;
            if (f.operator === 'contains')   return val.includes(fv);
            return true;
          });
        });

        const isTimeSeries = w.widget_type === 'timeseries';
        const cluster = w.date_cluster || 'week';

        // Aggregate
        const counts = {};
        const xField = isTimeSeries ? 'Inquiry Date' : w.x_field;
        if (xField) {
          wRows.forEach(r => {
            let key;
            if (isTimeSeries) {
              const d = new Date(r['Inquiry Date']);
              if (isNaN(d)) return;
              if (cluster === 'day')   key = d.toISOString().slice(0,10);
              else if (cluster === 'month') key = d.toLocaleString('en-GB',{month:'short',year:'numeric'});
              else { // week
                const day = d.getDay()||7;
                const mon = new Date(d); mon.setDate(d.getDate()-day+1);
                const sun = new Date(mon); sun.setDate(mon.getDate()+6);
                const fmt = dt => dt.getDate()+' '+dt.toLocaleString('en-GB',{month:'short'});
                key = fmt(mon)+' – '+fmt(sun);
              }
            } else {
              key = String(r[xField]||'Unknown').trim()||'Unknown';
            }
            if (w.y_aggregation === 'sum' && w.y_field !== 'count') {
              counts[key] = (counts[key]||0)+(parseFloat(r[w.y_field])||0);
            } else {
              counts[key] = (counts[key]||0)+1;
            }
          });
        }

        if (w.widget_type === 'kpi') {
          const val = w.y_aggregation === 'sum' && w.y_field !== 'count'
            ? wRows.reduce((s, r) => s + (parseFloat(r[w.y_field]) || 0), 0)
            : wRows.length;
          dynEl.innerHTML += `<div class="metric-card" style="margin-bottom:1rem;">
            <div class="metric-label">${w.title}</div>
            <div class="metric-value">${Math.round(val).toLocaleString('en-US')}</div>
            <div class="metric-sub">${filters.length ? filters.map(f=>`${f.field}: ${f.value}`).join(', ') : 'All records'}</div>
          </div>`;

        } else if (w.widget_type === 'table') {
          const tableRows = Object.entries(counts).sort((a,b) => b[1]-a[1]);
          dynEl.innerHTML += `
            <div class="section-header" style="margin-top:1rem;">${w.title}</div>
            <div class="table-scroll" style="margin-bottom:1.25rem;">
              <table class="data-table">
                <thead><tr><th style="text-align:left;">${xField}</th><th>${w.y_aggregation === 'sum' ? w.y_field : 'Count'}</th></tr></thead>
                <tbody>${tableRows.map(([k,v]) => `<tr><td>${k}</td><td>${Math.round(v).toLocaleString('en-US')}</td></tr>`).join('')}</tbody>
              </table>
            </div>`;

        } else {
          const canvasId = 'dynChart_' + w.id.replace(/-/g,'');
          dynEl.innerHTML += `
            <div class="chart-box" style="margin-bottom:1.25rem;">
              <div class="chart-title">${w.title}</div>
              <div class="chart-wrap" style="height:240px;"><canvas id="${canvasId}"></canvas></div>
            </div>`;
          // Sort time-series by key
          const sortedCounts = isTimeSeries
            ? Object.fromEntries(Object.entries(counts).sort((a,b)=>a[0].localeCompare(b[0])))
            : counts;
          widgetCharts[canvasId] = { w, counts: sortedCounts, isTimeSeries };
        }
      }

      setTimeout(() => {
        Object.entries(widgetCharts).forEach(([canvasId, { w, counts, isTimeSeries }]) => {
          const canvas = document.getElementById(canvasId);
          if (!canvas) return;
          const labels = Object.keys(counts);
          const data   = Object.values(counts);
          const colors = COLORS.slice(0, labels.length);
          const type   = (w.widget_type === 'doughnut') ? 'doughnut'
                       : (w.widget_type === 'timeseries' || w.widget_type === 'line') ? 'line'
                       : 'bar';
          new Chart(canvas, {
            type,
            data: { labels, datasets: [{ label: w.title, data,
              backgroundColor: type === 'line' ? colors[0]+'20' : colors,
              borderColor: type === 'line' ? colors[0] : colors,
              borderWidth: type === 'line' ? 2 : 1,
              fill: type === 'line', tension: 0.3,
              pointBackgroundColor: type === 'line' ? colors[0] : undefined,
            }]},
            options: {
              responsive: true, maintainAspectRatio: false,
              layout: { padding: { top: 16 } },
              plugins: {
                legend: { display: type === 'doughnut', position:'right', labels:{ font:{size:10}, boxWidth:12 } },
                datalabels: {
                  display: true, anchor:'end', align: type==='doughnut'?'center':'end',
                  font:{size:9,weight:'600'}, color: type==='doughnut'?'#fff':'#444',
                  formatter: (v, ctx) => {
                    if (type === 'doughnut') {
                      const t = ctx.dataset.data.reduce((a,b)=>a+b,0);
                      return t>0 ? Math.round(v/t*100)+'%' : '';
                    }
                    return v===0?'':Math.round(v).toLocaleString('en-US');
                  }
                }
              },
              scales: type==='doughnut'?{}:{
                x:{ticks:{font:{size:9},maxRotation:30}},
                y:{beginAtZero:true,ticks:{font:{size:10}}}
              }
            }
          });
        });
      }, 50);
    }
  }
  const mkDoughnut = (id, counts) => {
    const labels = Object.keys(counts);
    const data   = Object.values(counts);
    if (inqCharts[id]) inqCharts[id].destroy();
    inqCharts[id] = new Chart(document.getElementById(id), {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: CHART_COLORS.slice(0, labels.length), borderWidth: 1 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { font: { size: 10 }, boxWidth: 12 } },
          datalabels: { display: true, formatter: (v, ctx) => {
            const total = ctx.dataset.data.reduce((a,b) => a+b, 0);
            return total > 0 ? Math.round(v/total*100) + '%' : '';
          }, color: '#fff', font: { size: 10, weight: '600' } }
        }
      }
    });
  };

  mkDoughnut('inqByPropChart',    countBy(rows, 'Property'));
  mkDoughnut('inqBySourceChart',  countBy(rows, 'Inquiry Source'));
  mkDoughnut('inqByStatusChart',  countBy(rows, 'Inquiry Status'));

  // Table
  const headers = ['Name','Property','Status','Source','Inquiry Date','Check In','Check Out','Guests','Nationality','Payment'];
  const fieldMap = { 'Name':'Name','Property':'Property','Status':'Inquiry Status','Source':'Inquiry Source','Inquiry Date':'Inquiry Date','Check In':'Check In','Check Out':'Check Out','Guests':'No of guests','Nationality':'Nationality','Payment':'Payment Status' };

  const statusColors = { ongoing:'#185FA5', confirmed:'#1D9E75', cancelled:'#993C1D', lost:'#993C1D', converted:'#1D9E75', booked:'#1D9E75' };
  const getStatusColor = s => {
    const key = Object.keys(statusColors).find(k => s?.toLowerCase().includes(k));
    return key ? statusColors[key] : '#73726c';
  };

  tableEl.innerHTML = `<thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${
    rows.map(r => `<tr>${headers.map(h => {
      const v = r[fieldMap[h]] || '–';
      if (h === 'Status') return `<td style="color:${getStatusColor(v)};font-weight:500;">${v}</td>`;
      return `<td>${v}</td>`;
    }).join('')}</tr>`).join('')
  }</tbody>`;
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (activePeriod?.type === 'pace') renderPace();
    else if (activePeriod) renderDashboard(activePeriod);
  }, 200);
});
</script>
</body>
</html>
