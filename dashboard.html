<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tonik BI" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1a18" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Tonik Performance Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 1.25rem 1rem; padding-left: max(1rem, env(safe-area-inset-left)); padding-right: max(1rem, env(safe-area-inset-right)); padding-bottom: max(1.25rem, env(safe-area-inset-bottom)); }
    .container { max-width: 1400px; margin: 0 auto; }
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 8px; }
    .wordmark { font-size: 13px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #185FA5; flex-shrink: 0; }
    .page-title { font-size: 18px; font-weight: 500; color: #1a1a18; line-height: 1.2; }
    .page-sub { font-size: 11px; color: #73726c; margin-top: 3px; }
    .period-tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .tab-btn { font-size: 12px; padding: 7px 14px; border-radius: 6px; border: 1px solid #d3d1c7; cursor: pointer; background: #fff; color: #73726c; font-family: inherit; transition: all 0.15s; white-space: nowrap; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .tab-btn:hover { border-color: #185FA5; color: #185FA5; }
    .tab-btn.active { background: #185FA5; color: #fff; border-color: #185FA5; }
    .tab-btn.ytd { background: #1a1a18; color: #f5f4f0; border-color: #1a1a18; }
    .tab-btn.ytd.active { background: #185FA5; border-color: #185FA5; }
    .section-header { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #888780; margin-bottom: 0.875rem; padding-bottom: 0.5rem; border-bottom: 1px solid #d3d1c7; }
    .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 1.25rem; }
    .metric-card { background: #fff; border-radius: 10px; padding: 0.75rem 0.875rem; border: 1px solid #e8e7e1; }
    .metric-label { font-size: 10px; color: #888780; margin-bottom: 4px; line-height: 1.3; }
    .metric-value { font-size: 17px; font-weight: 500; color: #1a1a18; line-height: 1.2; word-break: break-word; }
    .metric-sub { font-size: 10px; color: #b4b2a9; margin-top: 3px; }
    .metric-var { font-size: 10px; margin-top: 4px; font-weight: 600; }
    .var-pos { color: #0F6E56; }
    .var-neg { color: #993C1D; }
    .chart-stack { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.25rem; }
    .chart-box { background: #fff; border: 1px solid #e8e7e1; border-radius: 12px; padding: 1rem; }
    .chart-title { font-size: 12px; font-weight: 500; color: #5f5e5a; margin-bottom: 0.5rem; }
    .legend { display: flex; gap: 12px; margin-bottom: 8px; font-size: 11px; color: #888780; }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .chart-wrap { position: relative; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 1.25rem; }
    .table-scroll::-webkit-scrollbar { height: 4px; }
    .table-scroll::-webkit-scrollbar-thumb { background: #d3d1c7; border-radius: 2px; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 11px; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e8e7e1; min-width: 640px; }
    .data-table th { text-align: right; padding: 7px 9px; color: #888780; font-weight: 600; font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; background: #f9f8f5; border-bottom: 1px solid #e8e7e1; white-space: nowrap; }
    .data-table th:first-child { text-align: left; }
    .data-table td { text-align: right; padding: 7px 9px; color: #2c2c2a; border-bottom: 1px solid #f1efe8; white-space: nowrap; }
    .data-table td:first-child { text-align: left; font-weight: 500; }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table .var-cell { font-weight: 600; }
    .data-table .total-row td { font-weight: 600; border-top: 1.5px solid #d3d1c7; background: #f9f8f5; }
    .scroll-hint { font-size: 10px; color: #b4b2a9; margin-bottom: 4px; display: none; }
    .tonik-section { margin-top: 2rem; padding-top: 1.75rem; border-top: 2px solid #d3d1c7; }
    .tonik-badge { display: inline-block; background: #185FA5; color: #B5D4F4; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 12px; border-radius: 6px; margin-bottom: 0.875rem; }
    .share-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 1.25rem; }
    .loading { text-align: center; padding: 3rem 1rem; color: #888780; font-size: 14px; }
    .error-banner { background: #fff0ed; border: 1px solid #f5c4b3; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1.25rem; font-size: 12px; color: #993C1D; }
    @media (min-width: 640px) {
      body { padding: 2rem 1.5rem; }
      .metric-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .share-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .chart-stack { display: grid; grid-template-columns: 1fr 1fr; }
      .chart-stack.single { display: block; }
      .metric-value { font-size: 20px; }
      .metric-label, .metric-var, .metric-sub { font-size: 11px; }
      .data-table { font-size: 12px; min-width: unset; }
      .data-table th { font-size: 10px; padding: 8px 10px; }
      .data-table td { padding: 8px 10px; }
    }
    @media (min-width: 1280px) {
      body { padding: 2.5rem 3rem; }
      .metric-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
      .share-grid  { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
      .chart-stack { gap: 1.25rem; margin-bottom: 1.5rem; }
      .chart-box   { padding: 1.25rem 1.5rem; }
      .chart-wrap  { }
      .metric-card { padding: 1rem 1.25rem; }
      .metric-value { font-size: 22px; }
      .metric-label { font-size: 12px; }
      .page-title  { font-size: 22px; }
      .section-header { font-size: 11px; }
      .data-table  { font-size: 13px; }
      .data-table th { font-size: 11px; padding: 9px 12px; }
      .data-table td { padding: 9px 12px; }
    }
    @media (min-width: 1600px) {
      body { padding: 3rem 4rem; }
      .chart-stack { grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    }
    @media (max-width: 639px) { .scroll-hint { display: block; } }
  </style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <div>
      <div class="page-title">Performance Dashboard</div>
      <div class="page-sub">Actuals vs budget — revenue, room nights, ARR, occupancy</div>
    </div>
    <div class="wordmark">Tonik</div>
    <a href="admin.html" style="font-size:11px;font-weight:500;color:#185FA5;text-decoration:none;background:#fff;border:1px solid #d3d1c7;padding:6px 12px;border-radius:6px;display:flex;align-items:center;gap:5px;flex-shrink:0;">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Admin
    </a>
  </div>

  <div id="app">
    <div class="loading">Loading dashboard data…</div>
  </div>
</div>

<script>
// ─── CONFIG — replace with your Supabase project values ───────────────────────
const SUPABASE_URL  = 'https://rmnufhsfuaycpkdzwfgj.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtbnVmaHNmdWF5Y3BrZHp3ZmdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5Njc3NjksImV4cCI6MjA5NzU0Mzc2OX0.rnBgL4fAowZrimTP3LZMSZwcOBcTW-kraPnupqyidU4';
// FY start month (April = 4)
const FY_START_MONTH = 4;
// ──────────────────────────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// helpers
function fmt(n)  { return Math.round(n || 0).toLocaleString('en-US'); }
function fmtShort(v) {
  if (!v || v === 0) return '0';
  if (Math.abs(v) >= 1000000) return (v/1000000).toFixed(1)+'M';
  if (Math.abs(v) >= 1000)    return (v/1000).toFixed(0)+'K';
  return Math.round(v).toString();
}
function fmtPct(n)    { return (n||0).toFixed(1)+'%'; }
function varCls(a,b)  { return (a||0)>=(b||0) ? 'var-pos' : 'var-neg'; }
function varSign(a,b) { const v=(a||0)-(b||0); return (v>=0?'+':'')+fmt(v); }
function varPctSign(a,b) { const v=(a||0)-(b||0); return (v>=0?'+':'')+v.toFixed(1)+'pp'; }

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fyLabel(year, month) {
  // FY2026-27 runs Apr 2026 – Mar 2027
  const fyStart = month >= FY_START_MONTH ? year : year - 1;
  return `FY${fyStart}–${String(fyStart+1).slice(2)}`;
}

// Get FY year key for a given calendar year+month
function fyKey(year, month) {
  return month >= FY_START_MONTH ? year : year - 1;
}

let allPropStats  = [];
let allTonikStats = [];
let allPaceStats  = [];
let charts = {};
let activePeriod = null; // { type: 'month'|'ytd', year, month, fyYear }

async function loadData() {
  const [{ data: ps, error: e1 }, { data: ts, error: e2 }, { data: pace, error: e3 }] = await Promise.all([
    sb.from('property_stats').select('*').order('stat_year').order('stat_month'),
    sb.from('tonik_stats').select('*').order('stat_year').order('stat_month'),
    sb.from('pace_stats').select('*').order('week_start'),
  ]);
  if (e1 || e2 || e3) throw new Error(e1?.message || e2?.message || e3?.message);
  allPropStats  = ps   || [];
  allTonikStats = ts   || [];
  allPaceStats  = pace || [];
}

function buildTabs() {
  // Collect distinct year+month combos across both tables, sorted
  const seen = new Set();
  [...allPropStats, ...allTonikStats].forEach(r => {
    if (r.stat_month === 99) return; // skip YTD flag rows
    seen.add(`${r.stat_year}-${String(r.stat_month).padStart(2,'0')}`);
  });
  const sorted = [...seen].sort();

  // Group by FY
  const fyGroups = {};
  sorted.forEach(key => {
    const [y, m] = key.split('-').map(Number);
    const fy = fyKey(y, m);
    if (!fyGroups[fy]) fyGroups[fy] = [];
    fyGroups[fy].push({ year: y, month: m });
  });

  return { sorted, fyGroups };
}

function renderTabs(fyGroups) {
  const container = document.getElementById('period-tabs');
  container.innerHTML = '';

  Object.entries(fyGroups).sort().forEach(([fy, months]) => {
    months.forEach(({ year, month }) => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn';
      btn.textContent = `${MONTH_NAMES[month-1]} ${year}`;
      btn.dataset.type  = 'month';
      btn.dataset.year  = year;
      btn.dataset.month = month;
      btn.dataset.fy    = fy;
      btn.addEventListener('click', () => selectPeriod({ type: 'month', year: +year, month: +month, fyYear: +fy }));
      container.appendChild(btn);
    });

    const ytdBtn = document.createElement('button');
    ytdBtn.className = 'tab-btn ytd';
    const fyEnd = +fy + 1;
    ytdBtn.textContent = `FY${String(fy).slice(2)}–${String(fyEnd).slice(2)} YTD`;
    ytdBtn.dataset.type = 'ytd';
    ytdBtn.dataset.fy   = fy;
    ytdBtn.addEventListener('click', () => selectPeriod({ type: 'ytd', fyYear: +fy }));
    container.appendChild(ytdBtn);
  });

  // Pace tab — always present, separated by a spacer
  const spacer = document.createElement('span');
  spacer.style.cssText = 'flex:1;';
  container.appendChild(spacer);

  const paceBtn = document.createElement('button');
  paceBtn.className = 'tab-btn';
  paceBtn.textContent = '📈 Booking Pace';
  paceBtn.dataset.type = 'pace';
  paceBtn.style.cssText = 'background:#1a1a18;color:#f5f4f0;border-color:#1a1a18;';
  paceBtn.addEventListener('click', () => selectPeriod({ type: 'pace' }));
  container.appendChild(paceBtn);
}

function selectPeriod(period) {
  activePeriod = period;
  document.querySelectorAll('#period-tabs .tab-btn').forEach(btn => {
    btn.classList.remove('active');
    const match = period.type === 'month'
      ? btn.dataset.type === 'month' && +btn.dataset.year === period.year && +btn.dataset.month === period.month
      : period.type === 'ytd'
      ? btn.dataset.type === 'ytd' && +btn.dataset.fy === period.fyYear
      : btn.dataset.type === 'pace';
    if (match) btn.classList.add('active');
  });

  // Toggle views
  const isPace = period.type === 'pace';
  document.getElementById('perf-view').style.display = isPace ? 'none' : '';
  document.getElementById('pace-view').style.display = isPace ? '' : 'none';

  if (isPace) {
    renderPace();
  } else {
    renderDashboard(period);
  }

}

// Aggregate property stats for a period
function getPropData(period) {
  let rows;
  if (period.type === 'month') {
    // Monthly: exclude YTD flag rows (month=99)
    rows = allPropStats.filter(r => r.stat_year === period.year && r.stat_month === period.month && r.stat_month !== 99);
  } else {
    // YTD: use the dedicated month=99 rows if they exist, otherwise sum monthly rows
    const ytdRows = allPropStats.filter(r => r.stat_year === period.fyYear && r.stat_month === 99);
    rows = ytdRows.length > 0 ? ytdRows : allPropStats.filter(r => fyKey(r.stat_year, r.stat_month) === period.fyYear && r.stat_month !== 99);
  }

  // Group by property
  const props = {};
  rows.forEach(r => {
    if (!props[r.property_name]) {
      props[r.property_name] = { name: r.property_name, type: r.property_type, revA:0, revB:0, arrA:null, arrB:null, rnA:0, rnB:0, occuA:0, occuB:0, _count:0 };
    }
    const p = props[r.property_name];
    p.revA  += r.rev_actual  || 0;
    p.revB  += r.rev_budget  || 0;
    p.rnA   += r.rn_actual   || 0;
    p.rnB   += r.rn_budget   || 0;
    p.occuA += r.occu_actual || 0;
    p.occuB += r.occu_budget || 0;
    // Always read ARR directly from stored values
    if (r.arr_actual) p.arrA = r.arr_actual;
    if (r.arr_budget) p.arrB = r.arr_budget;
    p._count++;
  });

  return Object.values(props).map(p => ({
    ...p,
    arrA: p.arrA !== undefined ? p.arrA : (p.rnA > 0 ? p.revA / p.rnA : 0),
    arrB: p.arrB !== undefined ? p.arrB : (p.rnB > 0 ? p.revB / p.rnB : 0),
    occuA: p._count > 0 ? p.occuA / p._count : 0,
    occuB: p._count > 0 ? p.occuB / p._count : 0,
  }));
}

// Aggregate tonik stats for a period
function getTonikData(period) {
  let rows;
  if (period.type === 'month') {
    rows = allTonikStats.filter(r => r.stat_year === period.year && r.stat_month === period.month && r.stat_month !== 99);
  } else {
    const ytdRows = allTonikStats.filter(r => r.stat_year === period.fyYear && r.stat_month === 99);
    rows = ytdRows.length > 0 ? ytdRows : allTonikStats.filter(r => fyKey(r.stat_year, r.stat_month) === period.fyYear && r.stat_month !== 99);
  }

  const segs = {};
  rows.forEach(r => {
    if (!segs[r.segment]) {
      segs[r.segment] = { segment: r.segment, revA:0, revB:0, arrA:null, arrB:null, rnA:0, rnB:0, occuA:0, occuB:0, shareA:0, shareB:0, villasA:0, villasB:0, roomsA:0, roomsB:0, _count:0 };
    }
    const s = segs[r.segment];
    s.revA   += r.rev_actual    || 0;
    s.revB   += r.rev_budget    || 0;
    s.rnA    += r.rn_actual     || 0;
    s.rnB    += r.rn_budget     || 0;
    s.shareA += r.share_actual  || 0;
    s.shareB += r.share_budget  || 0;
    s.occuA  += r.occu_actual   || 0;
    s.occuB  += r.occu_budget   || 0;
    s.villasA = Math.max(s.villasA, r.villas_actual || 0);
    s.villasB = Math.max(s.villasB, r.villas_budget || 0);
    s.roomsA += r.rooms_actual  || 0;
    s.roomsB += r.rooms_budget  || 0;
    if (r.arr_actual) s.arrA = r.arr_actual;
    if (r.arr_budget) s.arrB = r.arr_budget;
    s._count++;
  });

  return Object.fromEntries(
    Object.entries(segs).map(([k, s]) => [k.toLowerCase(), {
      ...s,
      arrA: s.arrA !== null ? s.arrA : (s.rnA > 0 ? s.revA / s.rnA : 0),
      arrB: s.arrB !== null ? s.arrB : (s.rnB > 0 ? s.revB / s.rnB : 0),
      occuA: s._count > 0 ? s.occuA / s._count : 0,
      occuB: s._count > 0 ? s.occuB / s._count : 0,
    }])
  );
}

const dlBase = {
  display: true, anchor: 'end', align: 'end', offset: 2,
  font: { size: 9, weight: '600' }, color: '#444441',
  formatter: v => v === 0 ? '' : fmtShort(v), clip: false,
};
const dlPct = { ...dlBase, formatter: v => v === 0 ? '' : (+v).toFixed(1)+'%' };
const isMobile = () => window.innerWidth < 640;

function chartOpts(yFmt, dlOverride) {
  const mob = isMobile();
  return {
    responsive: true, maintainAspectRatio: false,
    layout: { padding: { top: 22 } },
    plugins: {
      legend: { display: false },
      datalabels: { ...dlBase, ...(dlOverride||{}), font: { size: mob?8:9, weight:'600' } },
    },
    scales: {
      x: { ticks: { font: { size: mob?9:10 }, autoSkip: false, maxRotation: mob?30:20 } },
      y: { ticks: { font: { size: mob?9:10 }, callback: yFmt, maxTicksLimit: mob?4:6 } }
    }
  };
}

function destroyCharts() {
  Object.values(charts).forEach(c => c && c.destroy());
  charts = {};
}

function renderDashboard(period) {
  const props   = getPropData(period);
  const tonikSegs = getTonikData(period);
  const franchise  = tonikSegs['franchise']  || {};
  const management = tonikSegs['management'] || {};

  const totA = props.reduce((s,p) => s+p.revA, 0);
  const totB = props.reduce((s,p) => s+p.revB, 0);
  const rnA  = props.reduce((s,p) => s+p.rnA,  0);
  const rnB  = props.reduce((s,p) => s+p.rnB,  0);
  const arrA = rnA > 0 ? totA/rnA : 0;
  const arrB = rnB > 0 ? totB/rnB : 0;
  const avgOA = props.length ? props.reduce((s,p) => s+p.occuA, 0)/props.length : 0;
  const avgOB = props.length ? props.reduce((s,p) => s+p.occuB, 0)/props.length : 0;

  // ── Summary metric cards
  const propCards = [
    { label:'Total revenue (LKR)', a:'LKR '+fmt(totA), b:'Bgt: LKR '+fmt(totB), va:totA, vb:totB, occu:false },
    { label:'Room nights', a:fmt(rnA), b:'Bgt: '+fmt(rnB), va:rnA, vb:rnB, occu:false },
    { label:'Blended ARR (LKR)', a:fmt(arrA), b:'Bgt: '+fmt(arrB), va:arrA, vb:arrB, occu:false },
    { label:'Avg occupancy', a:fmtPct(avgOA), b:'Bgt: '+fmtPct(avgOB), va:avgOA, vb:avgOB, occu:true },
  ];

  const tRevA = (franchise.revA||0)+(management.revA||0);
  const tRevB = (franchise.revB||0)+(management.revB||0);
  const tShareA = (franchise.shareA||0)+(management.shareA||0);
  const tShareB = (franchise.shareB||0)+(management.shareB||0);
  const tRnA  = (franchise.rnA||0)+(management.rnA||0);
  const tRnB  = (franchise.rnB||0)+(management.rnB||0);
  const tOA   = ((franchise.occuA||0)+(management.occuA||0))/2;
  const tOB   = ((franchise.occuB||0)+(management.occuB||0))/2;

  const tonikCards = [
    { label:'Portfolio revenue actual', v:'LKR '+fmt(tRevA), sub:'Budget: LKR '+fmt(tRevB), va:tRevA, vb:tRevB, occu:false },
    { label:'Tonik Share actual', v:'LKR '+fmt(tShareA), sub:'Budget: LKR '+fmt(tShareB), va:tShareA, vb:tShareB, occu:false },
    { label:'Portfolio room nights', v:fmt(tRnA), sub:'Budget: '+fmt(tRnB), va:tRnA, vb:tRnB, occu:false },
    { label:'Avg portfolio occupancy', v:fmtPct(tOA), sub:'Budget: '+fmtPct(tOB), va:tOA, vb:tOB, occu:true },
    { label:'Active villas — Franchise', v:(franchise.villasA||0)+' villas', sub:'Budget: '+(franchise.villasB||0), va:franchise.villasA||0, vb:franchise.villasB||0, occu:false },
    { label:'Active room nights sellable — Management', v:fmt(management.roomsA||0), sub:'Budget: '+fmt(management.roomsB||0), va:management.roomsA||0, vb:management.roomsB||0, occu:false },
  ];

  const cardHtml = cards => cards.map(c => {
    const vv = c.occu ? varPctSign(c.va,c.vb) : varSign(c.va,c.vb);
    const cl = varCls(c.va, c.vb);
    const val = c.a || c.v;
    return `<div class="metric-card"><div class="metric-label">${c.label}</div><div class="metric-value">${val}</div><div class="metric-sub">${c.b||c.sub}</div><div class="metric-var ${cl}">${vv} vs budget</div></div>`;
  }).join('');

  // Property detail table
  const propTableRows = props.map(p => {
    const rv = p.revA-p.revB; const vc = varCls(p.revA,p.revB);
    return `<tr><td>${p.name}</td><td style="color:#888780">${p.type}</td><td>LKR ${fmt(p.revA)}</td><td>LKR ${fmt(p.revB)}</td><td class="var-cell ${vc}">${rv>=0?'+':''}${fmt(rv)}</td><td>${fmt(p.rnA)}</td><td>${fmt(p.rnB)}</td><td>${fmt(p.arrA)}</td><td>${fmt(p.arrB)}</td><td>${fmtPct(p.occuA)}</td><td>${fmtPct(p.occuB)}</td></tr>`;
  }).join('');

  const propHeaders = ['Property','Type','Rev Actual','Rev Budget','Rev Var','RN Actual','RN Budget','ARR Actual','ARR Budget','Occu Actual','Occu Budget'];

  // Tonik detail table
  const tonikRows = [
    { seg:'Franchise',  ...franchise  },
    { seg:'Management', ...management },
    { seg:'Total', revA:tRevA, revB:tRevB, rnA:tRnA, rnB:tRnB, arrA:tRnA>0?tRevA/tRnA:0, arrB:tRnB>0?tRevB/tRnB:0, occuA:tOA, occuB:tOB, shareA:tShareA, shareB:tShareB, _total:true }
  ];
  const tonikTableRows = tonikRows.map(r => {
    const rv = (r.revA||0)-(r.revB||0); const vc = varCls(r.revA,r.revB);
    const cls = r._total ? ' class="total-row"' : '';
    return `<tr${cls}><td>${r.seg}</td><td>LKR ${fmt(r.revA)}</td><td>LKR ${fmt(r.revB)}</td><td class="var-cell ${vc}">${rv>=0?'+':''}${fmt(rv)}</td><td>${fmt(r.rnA)}</td><td>${fmt(r.rnB)}</td><td>${fmt(r.arrA)}</td><td>${fmt(r.arrB)}</td><td>${fmtPct(r.occuA)}</td><td>${fmtPct(r.occuB)}</td><td>LKR ${fmt(r.shareA)}</td><td>LKR ${fmt(r.shareB)}</td></tr>`;
  }).join('');
  const tonikHeaders = ['Segment','Rev Actual','Rev Budget','Rev Var','RN Actual','RN Budget','ARR Actual','ARR Budget','Occu Actual','Occu Budget','Share Actual','Share Budget'];

  document.getElementById('prop-metrics').innerHTML  = cardHtml(propCards);
  document.getElementById('tonik-metrics').innerHTML = cardHtml(tonikCards);
  document.getElementById('propTable').innerHTML     = `<thead><tr>${propHeaders.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${propTableRows}</tbody>`;
  document.getElementById('tonikTable').innerHTML    = `<thead><tr>${tonikHeaders.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${tonikTableRows}</tbody>`;

  // Charts
  destroyCharts();
  const pLabels = props.map(p => p.name);

  charts.rev = new Chart(document.getElementById('revChart'), {
    type:'bar', data:{ labels:pLabels, datasets:[
      { label:'Actual', data:props.map(p=>p.revA), backgroundColor:'#185FA5' },
      { label:'Budget', data:props.map(p=>p.revB), backgroundColor:'#B5D4F4', borderWidth:1, borderColor:'#185FA5' }
    ]}, options:chartOpts(v=>v>=1e6?'LKR '+(v/1e6).toFixed(1)+'M':'LKR '+(v/1000).toFixed(0)+'K')
  });

  charts.occ = new Chart(document.getElementById('occuChart'), {
    type:'bar', data:{ labels:pLabels, datasets:[
      { label:'Actual', data:props.map(p=>p.occuA), backgroundColor:'#1D9E75' },
      { label:'Budget', data:props.map(p=>p.occuB), backgroundColor:'#9FE1CB', borderWidth:1, borderColor:'#1D9E75' }
    ]}, options:chartOpts(v=>v+'%', dlPct)
  });

  charts.arr = new Chart(document.getElementById('arrChart'), {
    type:'bar', data:{ labels:pLabels, datasets:[
      { label:'Actual', data:props.map(p=>p.arrA), backgroundColor:'#534AB7' },
      { label:'Budget', data:props.map(p=>p.arrB), backgroundColor:'#CECBF6', borderWidth:1, borderColor:'#534AB7' }
    ]}, options:chartOpts(v=>'LKR '+v.toLocaleString('en-US'))
  });

  const tLabels = ['Franchise','Management'];
  charts.tRev = new Chart(document.getElementById('tonikRevChart'), {
    type:'bar', data:{ labels:tLabels, datasets:[
      { label:'Actual', data:[franchise.revA||0, management.revA||0], backgroundColor:'#185FA5' },
      { label:'Budget', data:[franchise.revB||0, management.revB||0], backgroundColor:'#B5D4F4', borderWidth:1, borderColor:'#185FA5' }
    ]}, options:chartOpts(v=>v>=1e6?'LKR '+(v/1e6).toFixed(0)+'M':'LKR '+(v/1000).toFixed(0)+'K')
  });

  charts.share = new Chart(document.getElementById('shareChart'), {
    type:'bar', data:{ labels:tLabels, datasets:[
      { label:'Actual', data:[franchise.shareA||0, management.shareA||0], backgroundColor:'#D85A30' },
      { label:'Budget', data:[franchise.shareB||0, management.shareB||0], backgroundColor:'#F5C4B3', borderWidth:1, borderColor:'#D85A30' }
    ]}, options:chartOpts(v=>v>=1e6?'LKR '+(v/1e6).toFixed(0)+'M':'LKR '+(v/1000).toFixed(0)+'K')
  });
}

Chart.register(ChartDataLabels);

// ── Pace chart ────────────────────────────────────────────────────────────────
const PACE_PROPERTIES = ['KAHA','Villa Sayura','Garfield Bungalow','Garfield Cottage'];
const PACE_COLORS = ['#185FA5','#1D9E75','#534AB7','#D85A30'];
let paceChart = null;
let activePaceProperty = 'Total';

function renderPace() {
  if (!allPaceStats.length) return;
  const rangeVal = document.getElementById('pace-range')?.value || '20';

  // Build week map
  const weekMap = {};
  allPaceStats.forEach(r => {
    if (!weekMap[r.week_start]) weekMap[r.week_start] = { label: r.week_label, props: {} };
    weekMap[r.week_start].props[r.property_name] = r.room_nights || 0;
  });

  let weeks = Object.entries(weekMap).sort((a,b) => a[0].localeCompare(b[0]));

  // Compute total per week
  weeks.forEach(([, w]) => {
    w.props['Total'] = PACE_PROPERTIES.reduce((s, p) => s + (w.props[p] || 0), 0);
  });

  // Slice to range
  if (rangeVal !== 'all') weeks = weeks.slice(-parseInt(rangeVal));

  const labels = weeks.map(([,w]) => w.label);
  const data   = weeks.map(([,w]) => w.props[activePaceProperty] || 0);
  const lineColor = activePaceProperty === 'Total' ? '#185FA5' : PACE_COLORS[PACE_PROPERTIES.indexOf(activePaceProperty)];

  // Property toggle buttons
  const tc = document.getElementById('pace-toggles');
  if (tc) {
    const allProps = ['Total', ...PACE_PROPERTIES];
    tc.innerHTML = allProps.map((p, i) => {
      const c = p === 'Total' ? '#1a1a18' : PACE_COLORS[i-1];
      const active = p === activePaceProperty;
      return `<button onclick="setPaceProperty('${p}')" style="font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid ${active?c:'#d3d1c7'};background:${active?c:'#fff'};color:${active?'#fff':'#73726c'};cursor:pointer;font-family:inherit;transition:all 0.15s;white-space:nowrap;">${p}</button>`;
    }).join('');
  }

  // Render line chart
  if (paceChart) paceChart.destroy();
  paceChart = new Chart(document.getElementById('paceChart'), {
    type: 'line',
    data: { labels, datasets: [{
      label: activePaceProperty, data,
      borderColor: lineColor, backgroundColor: lineColor + '18',
      borderWidth: 2, pointRadius: 4, pointHoverRadius: 6,
      pointBackgroundColor: lineColor, fill: true, tension: 0.3,
    }]},
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 32, right: 20, left: 10, bottom: 10 } },
      plugins: {
        legend: { display: false },
        datalabels: { display: true, anchor:'end', align:'top', offset:2, font:{size:9,weight:'600'}, color: lineColor, formatter: v => v === 0 ? '' : v }
      },
      scales: {
        x: { ticks: { font:{size:9}, maxRotation:45, autoSkip: weeks.length > 12 } },
        y: { beginAtZero: true, grace: '15%', ticks: { font:{size:10}, stepSize:5 } }
      }
    }
  });

  // Render table
  const allProps = ['Total', ...PACE_PROPERTIES];
  const tableRows = weeks.map(([,w]) =>
    `<tr><td>${w.label}</td>${allProps.map(p=>`<td>${w.props[p]||0}</td>`).join('')}</tr>`
  ).join('');
  document.getElementById('paceTable').innerHTML =
    `<thead><tr>${['Week',...allProps].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${tableRows}</tbody>`;
}

function setPaceProperty(prop) {
  activePaceProperty = prop;
  renderPace();
}

init();

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (activePeriod?.type === 'pace') renderPace();
    else if (activePeriod) renderDashboard(activePeriod);
  }, 200);
});
